# Model profiles for ai-commit
#
# Format: profile|base_model|temperature|num_predict|num_ctx|min_files|description
#
# profile:      name used in OLLAMA_COMMIT_PROFILE env var and install menu
# base_model:   ollama model to build FROM (from https://ollama.com/search)
# temperature:  lower = more deterministic (0.0 - 1.0)
# num_predict:  max tokens to generate
# num_ctx:      context window size (how much diff the model can see)
# min_files:    minimum staged files for reliable output (0 = no limit)
# description:  shown during install
#
# The Ollama model will be created as: buun-commit-<profile>
# The "default" profile is also aliased as just "buun-commit"
#
# Models under 8B active parameters may hallucinate on small diffs.

default|gemma4:latest|0.1|400|8192|0|Gemma 4 12B - balanced speed and quality (recommended)
lite|gemma4:e4b|0.1|300|4096|0|Gemma 4 4B MoE (3.3GB) - best for laptops with 8-16GB RAM
tiny|gemma4:e2b|0.1|250|2048|3|Gemma 4 2B MoE (1.8GB) - minimal resources, may hallucinate
qwen|qwen3:8b|0.1|400|8192|0|Qwen 3 8B - alternative model
large|gemma4:latest|0.05|600|32768|0|Gemma 4 12B - max context window for huge diffs
